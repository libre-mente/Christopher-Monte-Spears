<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%">
  <defs>
    <!-- Your signature gold gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#aa8a2c" />
    </linearGradient>
    
    <!-- Deep purple-black background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#11091c" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </linearGradient>
  </defs>

  <!-- Dark rounded background square -->
  <rect width="32" height="32" rx="6" fill="url(#bgGrad)" />

  <!-- Sharp, Faceted Guitar Body & Headstock -->
  <g transform="translate(0, 1)">
    <!-- Angular Guitar Body (Polygonal) -->
    <path d="M16 11 L12 12 L11 15 L13.5 17.5 L10 21 L12 26 L16 27.5 L20 26 L22 21 L18.5 17.5 L21 15 L20 12 Z" 
          fill="none" 
          stroke="url(#goldGrad)" 
          stroke-width="1.8" 
          stroke-linejoin="miter" />
    
    <!-- Diamond Soundhole -->
    <path d="M16 15.5 L17.5 17 L16 18.5 L14.5 17 Z" fill="url(#goldGrad)" />
    
    <!-- Sharp Neck -->
    <path d="M15.2 11 V5.5 h1.6 V11 Z" fill="url(#goldGrad)" />
    
    <!-- Geometric Headstock Crown -->
    <path d="M15.2 5.5 L13.5 5.5 L12.5 2.5 L16 4 L19.5 2.5 L18.5 5.5 L16.8 5.5 Z" fill="url(#goldGrad)" />
  </g>
</svg>
